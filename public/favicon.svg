<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#0B1020"/>

  <!-- Glow -->
  <circle cx="64" cy="64" r="42" fill="url(#glow)" opacity="0.15"/>

  <!-- Bottom Book -->
  <g transform="rotate(-6 64 84)">
    <rect x="22" y="76" width="84" height="16" rx="5"
          fill="#111827"
          stroke="#334155"
          stroke-width="2"/>
    
    <!-- Pages -->
    <line x1="30" y1="84" x2="94" y2="84"
          stroke="#475569"
          stroke-width="1.5"
          stroke-linecap="round"/>
  </g>

  <!-- Middle Book -->
  <g transform="rotate(3 64 64)">
    <rect x="30" y="56" width="68" height="15" rx="5"
          fill="#131C31"
          stroke="#7DD3FC"
          stroke-width="2"/>
    
    <!-- Pages -->
    <line x1="38" y1="63.5" x2="90" y2="63.5"
          stroke="#94A3B8"
          stroke-width="1.5"
          stroke-linecap="round"/>
  </g>

  <!-- Top Book -->
  <g transform="rotate(-2 64 42)">
    <rect x="40" y="36" width="48" height="13" rx="5"
          fill="url(#topBook)"
          stroke="#C4B5FD"
          stroke-width="2"/>
    
    <!-- Pages -->
    <line x1="48" y1="42.5" x2="80" y2="42.5"
          stroke="white"
          stroke-opacity="0.6"
          stroke-width="1.4"
          stroke-linecap="round"/>
  </g>

  <!-- Floating Accent -->
  <circle cx="94" cy="30" r="3" fill="#A78BFA"/>
  <circle cx="102" cy="38" r="2" fill="#7DD3FC"/>

  <!-- Bottom Accent -->
  <path d="M42 106H86"
        stroke="url(#line)"
        stroke-width="3"
        stroke-linecap="round"/>

  <defs>

    <!-- Top Book Gradient -->
    <linearGradient id="topBook" x1="40" y1="36" x2="88" y2="49" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Accent Line -->
    <linearGradient id="line" x1="42" y1="106" x2="86" y2="106" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Background Glow -->
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(64 64) rotate(90) scale(42)">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>

  </defs>

</svg>